<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F601 現場安裝信心診斷</title>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 15px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 480px; margin: auto; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .input-group { margin-bottom: 18px; border-left: 4px solid #e2e8f0; padding-left: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.95em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fff; }
        input:focus, select:focus { border-color: #1a73e8; outline: none; background: #fff; }
        .feedback { margin-top: 8px; font-size: 0.85em; padding: 10px; border-radius: 6px; display: none; line-height: 1.5; }
        .f-ok { background: #e6fffa; color: #234e52; display: block; border: 1px solid #b2f5ea; }
        .f-warn { background: #fffaf0; color: #7b341e; display: block; border: 1px solid #feebc8; }
        .f-err { background: #fff5f5; color: #822727; display: block; border: 1px solid #feb2b2; }
        .theo-box { background: #1a73e8; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .dist-row { display: flex; gap: 10px; }
        .dist-row div { flex: 1; }
        .hint { color: #666; font-size: 0.75em; display: block; margin-top: 5px; line-height: 1.3; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>F601 架設信心診斷</h2>
    
    <!-- 1. 水溫與理論聲速 -->
    <div class="input-group">
        <label>1. 現場水溫 (°C)</label>
        <input type="number" id="temp" placeholder="請輸入現場水溫" oninput="run()">
    </div>
    <div id="theo_display" class="theo-box">理論聲速：--- m/s</div>

    <!-- 2. 實測聲速 -->
    <div class="input-group">
        <label>2. 實測聲速 c (m/s)</label>
        <input type="number" id="c_val" placeholder="儀器診斷畫面之 c 值" oninput="run()">
        <div id="c_fb" class="feedback"></div>
    </div>

    <!-- 3. S 振幅 -->
    <div class="input-group">
        <label>3. S 振幅 (條狀圖格數 0-9)</label>
        <input type="number" id="s_val" placeholder="請填格數" min="0" max="9" oninput="run()">
        <div id="s_fb" class="feedback"></div>
    </div>

    <!-- 4. Q 狀態 -->
    <div class="input-group">
        <label>4. Q 訊號品質狀態</label>
        <select id="q_state" onchange="run()">
            <option value="">--請選擇狀態--</option>
            <option value="undef">顯示 UNDEF (無法量測)</option>
            <option value="jump">頻繁跳動 / 閃爍 (後三格不穩)</option>
            <option value="stable">穩定固定 (滿格/高位)</option>
        </select>
        <div id="q_fb" class="feedback"></div>
    </div>

    <!-- 5. Gain 診斷 -->
    <div class="input-group">
        <label>5. Gain 訊號增益 (dB)</label>
        <input type="number" id="g_val" placeholder="請輸入 Gain 值" oninput="run()">
        <div id="g_fb" class="feedback"></div>
    </div>

    <!-- 6. SNR 診斷 -->
    <div class="input-group">
        <label>6. SNR 信噪比 (dB)</label>
        <input type="number" id="snr_val" placeholder="請輸入 SNR 值" oninput="run()">
        <div id="snr_fb" class="feedback"></div>
    </div>

    <!-- 7. 間距分級診斷 -->
    <div class="input-group" style="border-left-color: #4299e1;">
        <label>7. 探頭間距確認 (Distance)</label>
        <div class="dist-row">
            <div><input type="number" id="d_suggest" placeholder="F601 建議" oninput="run()"></div>
            <div><input type="number" id="d_real" placeholder="現場實際" oninput="run()"></div>
        </div>
        <div id="d_fb" class="feedback"></div>
        <span class="hint">💡 以「正式測量開始後」顯示之建議值為準。</span>
    </div>
</div>

<script>
    function run() {
        const t = parseFloat(document.getElementById('temp').value);
        const c = parseFloat(document.getElementById('c_val').value);
        const s = parseFloat(document.getElementById('s_val').value);
        const q = document.getElementById('q_state').value;
        const g = parseFloat(document.getElementById('g_val').value);
        const snr = parseFloat(document.getElementById('snr_val').value);
        const ds = parseFloat(document.getElementById('d_suggest').value);
        const dr = parseFloat(document.getElementById('d_real').value);

        let theoC = 0;
        if (!isNaN(t)) {
            theoC = 1402.385 + 5.0388 * t - 0.05799 * t * t + 0.000323 * t * t * t;
            document.getElementById('theo_display').innerText = `理論聲速：${theoC.toFixed(1)} m/s`;
        }

        // 1. 聲速判定 (2% 門檻)
        const cFb = document.getElementById('c_fb');
        if (!isNaN(c) && theoC > 0) {
            let diffPercent = Math.abs(c - theoC) / theoC;
            if (c > 1540) {
                showFb(cFb, 'f-err', `❌ 聲速極高(${c})：抓到「管壁波」！嚴禁記錄。請重新 Signal Search 或換 Z 模式。`);
            } else if (diffPercent > 0.02) {
                showFb(cFb, 'f-err', `❌ 偏差過大(${(diffPercent*100).toFixed(1)}%)：超過 2% 標準。數據將有明顯線性誤差！`);
            } else {
                showFb(cFb, 'f-ok', `✅ 聲速正確：偏差在 2% 內，確認抓到流體訊號。`);
            }
        }

        // 2. S 判定
        const sFb = document.getElementById('s_fb');
        if (!isNaN(s)) {
            if (s >= 3) showFb(sFb, 'f-ok', `✅ 能量充足 (等級 ${s})。`);
            else if (s == 2) showFb(sFb, 'f-warn', `⚠️ 能量偏弱：請重新檢查打磨度或重塗耦合劑。`);
            else showFb(sFb, 'f-err', `❌ 能量極低：嚴禁紀錄。`);
        }

        // 3. Q 判定
        const qFb = document.getElementById('q_fb');
        if (q === 'undef') showFb(qFb, 'f-err', `❌ UNDEF：儀器無法讀取波形。`);
        else if (q === 'jump') showFb(qFb, 'f-warn', `⚠️ 後三格跳動：相關性不穩。零點可能飄移，建議微調探頭位置。`);
        else if (q === 'stable') showFb(qFb, 'f-ok', `✅ 訊號穩定：後三格固定，數據可靠度高。`);

        // 4. Gain 判定
        const gFb = document.getElementById('g_fb');
        if (!isNaN(g)) {
            if (g < 98) showFb(gFb, 'f-ok', `✅ 增益優良 (${g} dB)。`);
            else if (g <= 113) showFb(gFb, 'f-warn', `⚠️ 增益偏高 (${g} dB)：大管徑可接受，但須確保穩定。`);
            else showFb(gFb, 'f-err', `❌ 增益極高 (${g} dB)：訊號嚴重衰減。`);
        }

        // 5. SNR 判定
        const snrFb = document.getElementById('snr_fb');
        if (!isNaN(snr)) {
            if (snr > 15) showFb(snrFb, 'f-ok', `✅ SNR 良好 (${snr} dB)。`);
            else if (snr >= 0) showFb(snrFb, 'f-warn', `⚠️ SNR 偏低 (${snr} dB)：環境雜訊干擾，建議增加 Damping。`);
            else showFb(snrFb, 'f-err', `❌ SNR 極差 (${snr} dB)：嚴禁紀錄。`);
        }

        // 6. 間距分級判定 (新邏輯)
        const dFb = document.getElementById('d_fb');
        if (!isNaN(ds) && !isNaN(dr)) {
            let dDiff = Math.abs(ds - dr);
            if (dDiff <= 2) {
                showFb(dFb, 'f-ok', `✅ <strong>優良 (Pro)</strong>：偏差僅 ${dDiff.toFixed(1)}mm。訊號相位完美對齊。`);
            } else if (dDiff <= 5) {
                showFb(dFb, 'f-warn', `⚠️ <strong>合格 (Standard)</strong>：偏差 ${dDiff.toFixed(1)}mm。符合原廠標準，但若 Q 值跳動建議再微調。`);
            } else {
                showFb(dFb, 'f-err', `❌ <strong>警告 (Fail)</strong>：偏差 ${dDiff.toFixed(1)}mm。超過 5mm 容許值，請重新校正探頭位置。`);
            }
        }
    }

    function showFb(el, cls, txt) {
        el.className = 'feedback ' + cls;
        el.innerHTML = txt;
    }
</script>

</body>
</html>
